    <meta charset="UTF-8"><!--permiti caracteris especiais-->

    <title>Cadastro</title>
</head>
<body>

<form id="formCadastro">
<div>
    <div>
        <label> Nome:</label>
        <input type="text" name="nome" required> <!--o required serve para ser obricatorio escrever o nome ai-->
    </div>
</div>

<div>
    <div>
        <label> cpf:</label>
        <input type="text" name="cpf" required> <!--o required serve para ser obricatorio escrever o nome ai-->
    </div>
</div>

<div>
    <div>
        <label> email:</label>
        <input type="email" name="email" required> <!--o required serve para ser obricatorio escrever o nome ai-->
    </div>
</div>
<div>
    <div>
        <label> telefone:</label>
        <input type="text" name="telefone" required> <!--o required serve para ser obricatorio escrever o nome ai-->
    </div>
</div>

<div>
    <div>
        <label> endereço:</label>
        <input type="text" name="endereço" required> <!--o required serve para ser obrigatorio escrever o nome ai-->
    </div>
</div>

<div>
    <div>
        <label> observação:</label>
        <textarea></textarea>
    </div>
</div>

<button type="submit">Enviar</button>

</form>
</body>
</html>
